<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>Open in Container</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1E1E3A;
      color: #EDF6FB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .picker {
      width: 480px;
      background: #12122A;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
    }

    .picker-header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .picker-header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .picker-header p {
      font-size: 13px;
      color: rgba(237, 246, 251, 0.35);
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .container-list {
      max-height: 60vh;
      overflow-y: auto;
      padding: 8px 0;
    }

    .container-list::-webkit-scrollbar {
      width: 4px;
    }

    .container-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .container-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .container-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 28px;
      cursor: pointer;
      transition: background-color 0.12s;
    }

    .container-item:hover {
      background: #222248;
    }

    .container-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .container-name {
      font-size: 15px;
      font-weight: 500;
    }

    .picker-footer {
      padding: 14px 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .cancel-btn {
      background: none;
      border: none;
      color: rgba(237, 246, 251, 0.6);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 6px;
      transition: all 0.12s;
    }

    .cancel-btn:hover {
      color: #EDF6FB;
      background: #222248;
    }

    .loading {
      padding: 40px;
      text-align: center;
      color: rgba(237, 246, 251, 0.35);
      font-size: 14px;
    }

    /* New container form */
    .new-container {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 28px;
      cursor: pointer;
      transition: background-color 0.12s;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .new-container:hover {
      background: #222248;
    }

    .new-container-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px dashed rgba(237, 246, 251, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: rgba(237, 246, 251, 0.4);
      flex-shrink: 0;
    }

    .new-container-label {
      font-size: 14px;
      color: rgba(237, 246, 251, 0.5);
    }

    /* Inline create form */
    .create-form {
      padding: 16px 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: none;
    }

    .create-form.visible {
      display: block;
    }

    .create-form input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      font-size: 13px;
      background: #0B0B1A;
      color: #EDF6FB;
      outline: none;
      margin-bottom: 10px;
    }

    .create-form input::placeholder {
      color: rgba(237, 246, 251, 0.3);
    }

    .create-form input:focus {
      border-color: #3E5DE0;
    }

    .color-options {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .color-option {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.12s;
    }

    .color-option:hover,
    .color-option.selected {
      border-color: #EDF6FB;
    }

    .create-btn {
      background: linear-gradient(135deg, #CA1ECC, #3E5DE0);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.12s;
    }

    .create-btn:hover {
      opacity: 0.9;
    }

    .create-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* Missing extension message */
    .missing-ext {
      padding: 32px 28px;
      text-align: center;
    }

    .missing-ext p {
      color: rgba(237, 246, 251, 0.5);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .missing-ext a {
      display: inline-block;
      background: linear-gradient(135deg, #CA1ECC, #3E5DE0);
      color: white;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.12s;
    }

    .missing-ext a:hover {
      opacity: 0.9;
    }

    /* Banner */
    .banner {
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .banner::before {
      font-size: 16px;
      flex-shrink: 0;
    }

    .banner.hidden {
      display: none;
    }

    .banner.INFO {
      background: rgba(62, 93, 224, 0.15);
      border-bottom: 1px solid rgba(62, 93, 224, 0.3);
      color: #7b9bff;
    }

    .banner.INFO::before {
      content: "ℹ️";
    }

    .banner.WARNING {
      background: rgba(255, 203, 0, 0.15);
      border-bottom: 1px solid rgba(255, 203, 0, 0.3);
      color: #ffcb00;
    }

    .banner.WARNING::before {
      content: "⚠️";
    }

    .banner.CAUTION {
      background: rgba(220, 53, 69, 0.15);
      border-bottom: 1px solid rgba(220, 53, 69, 0.3);
      color: #ff6b7a;
    }

    .banner.CAUTION::before {
      content: "⛔";
    }
  </style>
</head>

<body>
  <div class="picker">
    <div id="banner" class="banner hidden"></div>
    <div class="picker-header">
      <h1>Open in Container</h1>
      <p id="destination"></p>
    </div>
    <div id="container-list" class="container-list">
      <div class="loading">Loading containers...</div>
    </div>
    <div class="picker-footer">
      <button id="cancel" class="cancel-btn">Cancel</button>
    </div>
  </div>

  <script src="picker.js"></script>
</body>

</html>
